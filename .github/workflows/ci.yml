docker-check:

  name: Docker Lint & Build

  runs-on: ubuntu-latest


  steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Run Hadolint Backend Dockerfile
      run: |
        if [ -f "./backend/Dockerfile" ]; then
          docker run --rm \
            -i hadolint/hadolint < ./backend/Dockerfile
        else
          echo "Backend Dockerfile not found - skipping"
        fi


    - name: Build Backend Docker Image
      run: |
        if [ -f "./backend/Dockerfile" ]; then
          docker build \
            -t mern-backend:test \
            ./backend
        else
          echo "Backend Dockerfile not found - skipping"
        fi


    - name: Build Frontend Docker Image
      run: |
        if [ -f "./frontend/Dockerfile" ]; then
          docker build \
            -t mern-frontend:test \
            ./frontend
        else
          echo "Frontend Dockerfile not found - skipping"
        fi
