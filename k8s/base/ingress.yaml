# ==============================================================================
# Ingress Resource
# Rules for routing external HTTP/HTTPS traffic to internal ClusterIP services
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mern-ingress
  annotations:
    # Use nginx like ingress controller
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: mern-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
