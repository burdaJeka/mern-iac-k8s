# ==============================================================================
# 1. Creating Service (Network access) for MongoDB
# ==============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service # name of mongodb-service
spec:
  selector:
    app: mongodb # POD tag
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
# ==============================================================================
# 2. Creating Deployment for MongoDB
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "admin"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "secretpassword"
