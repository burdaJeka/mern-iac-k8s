# ==============================================================================
# MongoDB Service (Internal DNS for inter-service communication)
# ==============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# ==============================================================================
# MongoDB StatefulSet (Ensures data persistence and stable network identity)
# ==============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: "mongodb"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "admin"
            # Password is injected from a Kubernetes Secret, avoiding plain-text hardcoding
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mern-secrets
                  key: db-password
          # Mount the Persistent Volume to the container
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  # Persistent Volume Claim Template for dynamic storage provisioning
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi
