# ==============================================================================
# Backend Service (Internal communication)
# ==============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80

---
# ==============================================================================
# Backend API Deployment
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: mendhak/http-https-echo:30
          ports:
            - containerPort: 80
          env:
            # MongoDB connection string injected from Kubernetes Secret
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: mern-secrets
                  key: mongo-url
