# ==============================================================================
# Local Environment Overlay
# Applies environment-specific configurations on top of the base manifests.
# ==============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Point Kustomize to the base architecture blueprints
resources:
  - ../../base

# Dynamically generate a Kubernetes Secret from the local .env file.
# This ensures sensitive data is injected securely without hardcoding in Git.
secretGenerator:
  - name: mern-secrets
    envs:
      - .env
